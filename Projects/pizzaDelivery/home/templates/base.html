<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Pizza App{% endblock %}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --nav-bg: #1a1a2e;
      --accent: #e03d2f;
      --accent-hover: #c2321f;
      --text: #1c1c1c;
      --muted: #6b6b6b;
      --border: #e0ddd8;
      --radius: 14px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    header {
      background: var(--nav-bg);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.5px;
    }

    header .brand span { color: var(--accent); }

    header nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }
    header nav a:hover { color: #fff; }

    /* ── Main content ── */
    main {
      flex: 1;
      padding: 2.5rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Footer ── */
    footer {
      background: var(--nav-bg);
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
    }

    /* ── Reusable Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }

    /* ── Section heading ── */
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      color: var(--text);
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <header>
    <a href="/" class="brand">Pizza<span>App</span></a>
    <nav>
      <a href="/">Menu</a>
      <a href="#">Orders</a>
      <a href="#">Cart</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>Pizza App &copy; 2024 &mdash; Made with ❤️</p>
  </footer>

</body>
</html>
