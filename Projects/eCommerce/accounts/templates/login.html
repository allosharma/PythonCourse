{% extends 'utils/base.html' %}

{% block start %}

<div class="container mx-auto col-md-6 shadow p-5 mt-5">
    <h2 class="mb-4">Sign In</h2>
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <input type="text" name="phone_number" class="form-control mb-3" placeholder="Enter phone number" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary mt-3">Login</button>
    </form>

    <p class="mt-3 mb-0 text-muted">
        If not registered, <a href="{% url 'registration' %}" class="text-muted">register now!</a>
    </p>
</div>

{% endblock %}
