<div class = "container">
		<div class = "row">
			<div class = "col-md-2 mt-2">
				  <a class="navbar-brand" href="{% url 'home' %}">
                    <img style="height: 60px !important" src="https://cdn.dribbble.com/userupload/17039932/file/original-983633d1f6de58f5d871f174ff34f057.jpg"alt = "image of logo" class = "img-fluid "></a>
			</div>
	
			<div class = "col-md-7">
				<div class="input-group mt-3">
  <input type="text" class="form-control" placeholder="Search" aria-label="Recipient's username" aria-describedby="button-addon2">
  <div class="input-group-append">

    <button class="btn btn-primary" type="button" id="button-addon2">
		<i class="fas fa-search"></i>
	</button>

  </div>
</div>
			</div>


			<div class = "col-md-3 mt-3">
				<div class = "circle float-right">
						<i class="fas fa-shopping-cart text-muted"></i>
						<span class="badge badge-danger">0</span>
				
				</div>
				{% if not request.user.is_authenticated %}
				<div class = "circle float-right mr-4">
						<i class="fas fa-user text-muted"data-target="#exampleModal" data-toggle="modal"></i>
						<span class="badge badge-danger">0</span>
				</div>
					{% else %}
					<!--Logout button-->
					<div class="dropdown float-right mr-4">
						<a class="dropdown-toggle" href="#" role="button" id="dropdownMenuLink" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
							<i class="fas fa-user text-muted"></i>
						</a>

						<div class="dropdown-menu dropdown-menu-right" aria-labelledby="dropdownMenuLink">
							<a class="dropdown-item" href="#">Orders</a>
							<form method="post" action="{% url 'logout' %}" class="px-3 py-1">
								{% csrf_token %}
								<button type="submit" class="btn btn-link dropdown-item p-0 text-left">Logout</button>
							</form>
						</div>
					</div>
				{% endif %}
			</div>
		</div>
</div>
